<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bouncing chill guy</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: black;
            height: 100vh;
            width: 100vw;
            position: relative;
        }
        #chillguy {
            position: absolute;
            width: 100px;
            height: auto;
            top: 0;
            left: 0;
        }
    </style>
</head>
<body>
    <img src="chillguy.png" id="chillguy" alt="Chill Guy">
    
    <script>
        const logo = document.getElementById('chillguy');
        const speed = 2;
        let dx = speed;
        let dy = speed;

        let viewportWidth = window.innerWidth;
        let viewportHeight = window.innerHeight;

        window.addEventListener('resize', () => {
            viewportWidth = window.innerWidth;
            viewportHeight = window.innerHeight;
        });

        function moveLogo() {
            let x = logo.offsetLeft;
            let y = logo.offsetTop;

            x += dx;
            y += dy;

            const logoWidth = logo.offsetWidth;
            const logoHeight = logo.offsetHeight;

            if (x + logoWidth >= viewportWidth || x <= 0) {
                dx = -dx;
                changeColor();
            }
            if (y + logoHeight >= viewportHeight || y <= 0) {
                dy = -dy;
                changeColor();
            }

            logo.style.left = x + 'px';
            logo.style.top = y + 'px';

            requestAnimationFrame(moveLogo);
        }

        function changeColor() {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            const img = new Image();
            img.src = logo.src;
            img.onload = () => {
                canvas.width = img.width;
                canvas.height = img.height;
                ctx.drawImage(img, 0, 0);

                ctx.fillStyle = getRandomColor();
                ctx.globalCompositeOperation = 'source-atop';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                logo.src = canvas.toDataURL();
            };
        }

        function getRandomColor() {
            const letters = '0123456789ABCDEF';
            let color = '#';
            for (let i = 0; i < 6; i++) {
                color += letters[Math.floor(Math.random() * 16)];
            }
            return color;
        }

        moveLogo();
    </script>
</body>
</html>
