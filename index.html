<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bouncing chill guy</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-image: url('field.jpg');
            background-size: cover;
            background-position: center;
            height: 100vh;
            width: 100vw;
            position: relative;
        }
        #chillguy {
            position: absolute;
            width: 100px;
            height: auto;
            top: 0;
            left: 0;
        }
    </style>
</head>
<body>
    <img src="chillguy.png" id="chillguy" alt="Chill Guy">
    
    <script>
        const logo = document.getElementById('chillguy');
        const speed = 5;
        let dx = speed;
        let dy = speed;

        let viewportWidth = window.innerWidth;
        let viewportHeight = window.innerHeight;

        window.addEventListener('resize', () => {
            viewportWidth = window.innerWidth;
            viewportHeight = window.innerHeight;
        });

        function moveLogo() {
            let x = logo.offsetLeft;
            let y = logo.offsetTop;

            x += dx;
            y += dy;

            const logoWidth = logo.offsetWidth;
            const logoHeight = logo.offsetHeight;

            if (x + logoWidth >= viewportWidth || x <= 0) {
                dx = -dx;
            }
            if (y + logoHeight >= viewportHeight || y <= 0) {
                dy = -dy;
            }

            logo.style.left = x + 'px';
            logo.style.top = y + 'px';

            requestAnimationFrame(moveLogo);
        }

        moveLogo();
    </script>
</body>
</html>
