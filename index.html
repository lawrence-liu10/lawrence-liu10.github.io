<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bouncing Chill Guy</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-image: url('field.jpg');
            background-size: cover;
            background-position: center;
            height: 100vh;
            width: 100vw;
            position: relative;
        }
        #chillguy {
            position: absolute;
            width: 200px;
            height: auto;
        }
    </style>
</head>
<body>
    <img src="chillguy.png" id="chillguy" alt="Chill Guy">

    <audio id="backgroundAudio" src="chill_anthem.mp3" loop></audio>
    
    <script>
        window.onload = () => {
            const logo = document.getElementById('chillguy');
            const audio = document.getElementById('backgroundAudio');
            const speed = 3;
            let dx = speed;
            let dy = speed;
    
            let viewportWidth = window.innerWidth;
            let viewportHeight = window.innerHeight;
    
            window.addEventListener('resize', () => {
                viewportWidth = window.innerWidth;
                viewportHeight = window.innerHeight;
            });
    
            function moveLogo() {
                let x = logo.offsetLeft;
                let y = logo.offsetTop;
    
                x += dx;
                y += dy;
    
                const logoWidth = logo.offsetWidth;
                const logoHeight = logo.offsetHeight;
    
                if (x + logoWidth >= viewportWidth || x <= 0) {
                    dx = -dx;
                }
                if (y + logoHeight >= viewportHeight || y <= 0) {
                    dy = -dy;
                }
    
                logo.style.left = x + 'px';
                logo.style.top = y + 'px';
    
                requestAnimationFrame(moveLogo);
            }
    
            function togglePlay() {
                if (audio.paused) {
                    audio.play().catch((error) => {
                        console.error('Audio playback failed:', error);
                    });
                } else {
                    audio.pause();
                }
            }
    
            function setRandomPosition() {
                const logoWidth = logo.offsetWidth;
                const logoHeight = logo.offsetHeight;
    
                const maxX = viewportWidth - logoWidth;
                const maxY = viewportHeight - logoHeight;
    
                const randomX = Math.floor(Math.random() * maxX);
                const randomY = Math.floor(Math.random() * maxY);
    
                logo.style.left = randomX + 'px';
                logo.style.top = randomY + 'px';
            }
    
            setRandomPosition();
            moveLogo();
    
            document.body.addEventListener('click', () => {
                togglePlay();
            });
    
            audio.volume = 0.5;
        };
    </script>
</body>
</html>
